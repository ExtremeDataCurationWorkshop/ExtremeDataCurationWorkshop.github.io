title: "Extreme Curation 2026"
subtitle: "First Annual Workshop on Curation and Contextualization of Extreme Datasets"

description: >-
  A workshop bringing together researchers and practitioners to advance
  the theory and practice of big data curation.

venue: >-
  In association with the 2026 IEEE International Conference on Big Data
  (IEEE BigData 2026) — Phoenix AZ, December 14–17 2026

# Theme — vendored locally from pages-themes/minimal
# (no theme: line needed; _layouts/default.html and _sass/ take precedence)


# GitHub repo (required by jekyll-seo-tag locally)
repository: BigDataCurationWorkshop/BigDataCurationWorkshop.github.io

#Site URL (update when you know the final GitHub Pages URL)
#url: "https://bigdatacurationworkshop.github.io"
#baseurl: ""

# Author / contact
author:
  name: "Workshop Organizers"
  email: ""

# Navigation pages (in order)
header_pages:
  - index.md
  - cfp.md
  - schedule.md
  - speakers.md
  - logistics.md
  - organizers.md

# Markdown processor
markdown: kramdown
highlighter: rouge

# Plugins allowed on GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  
# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - "\\#*\\#"   # Emacs auto-save files
  - ".\\#*"    # Emacs lock symlinks


polling: true

