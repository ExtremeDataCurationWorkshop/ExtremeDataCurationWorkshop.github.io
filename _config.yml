title: "Big Data Curation Workshop"
description: >-
  A workshop bringing together researchers and practitioners to advance
  the theory and practice of big data curation.

# Theme — GitHub Pages built-in
theme: minima

# Site URL (update when you know the final GitHub Pages URL)
# url: "https://bigdatacurationworkshop.github.io"
# baseurl: ""

# Author / contact
author:
  name: "Workshop Organizers"
  email: ""

# Navigation pages (in order)
header_pages:
  - index.md
  - cfp.md
  - schedule.md
  - speakers.md
  - logistics.md
  - organizers.md

# Markdown processor
markdown: kramdown
highlighter: rouge

# Plugins allowed on GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
