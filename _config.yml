title: "Extreme Curation 2026"
slogan: "First Annual Workshop on Curation and Contextualization of Extreme Datasets"
description: >-
  A workshop bringing together researchers and practitioners to advance
  the theory and practice of big data curation. Co-located with the 2026
  IEEE International Conference on Big Data — Phoenix AZ, December 14–17 2026.

# Feeling Responsive theme via remote_theme (GitHub Pages deployment)
# NOTE: local preview requires SSL to be working — see _config_local.yml
remote_theme: Phlow/feeling-responsive

# GitHub repo
repository: ExtremeDataCurationWorkshop/ExtremeDataCurationWorkshop.github.io

#url: "https://extremedatacurationworkshop.github.io"
#baseurl: ""

# Main author — details in _data/authors.yml
author: organizers

# Footer credits
credits: >-
  <p>Extreme Curation 2026 &mdash; Co-located with
  <a href="https://bigdataieee.org/BigData2026/">IEEE BigData 2026</a>.
  Contact: <a href="mailto:ExtremeCurationWorkshop@googlegroups.com">ExtremeCurationWorkshop@googlegroups.com</a></p>

# Logo (place a logo.png in the root if desired)
# logo: "logo.png"

# Image URL base (not used — no hosted image CDN)
urlimg: '/images/'

# Markdown
markdown: kramdown
highlighter: rouge
permalink: /:title/
excerpt_separator: "<!--more-->"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - _config_local.yml
  - "\\#*\\#"
  - ".\\#*"

# Sass
sass:
  sass_dir: _sass
  style: :compressed

# Page defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      show_meta: false
      comments: false
      author: organizers
