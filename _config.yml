title: "Extreme Curation 2026"
subtitle: "First Annual Workshop on Curation and Contextualization of Extreme Datasets"
description: >-
  A workshop bringing together researchers and practitioners to advance
  the theory and practice of big data curation.

# GitHub Pages deployment uses remote_theme.
# For local preview, _config_local.yml overrides this with the gem.
remote_theme: mmistakes/minimal-mistakes

# GitHub repo (required by jekyll-seo-tag)
repository: ExtremeDataCurationWorkshop/ExtremeDataCurationWorkshop.github.io

#url: "https://extremedatacurationworkshop.github.io"
#baseurl: ""

# Minimal Mistakes skin — options: default, air, aqua, contrast, dark, dirt,
#   neon, mint, plum, sunrise
minimal_mistakes_skin: "default"

# Site author (populates sidebar author block)
author:
  name: "Workshop Organizers"
  email: "ExtremeCurationWorkshop@googlegroups.com"
  bio: >-
    In association with the 2026 IEEE International Conference on Big Data
    (IEEE BigData 2026) — Phoenix AZ, December 14–17 2026

# Navigation — defined in _data/navigation.yml
# The key "main" is used by the masthead (top nav bar)

# Markdown processor
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - _config_local.yml
  - "\\#*\\#"
  - ".\\#*"

# Defaults — apply layout and sidebar nav to all pages
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      sidebar:
        nav: "main"
